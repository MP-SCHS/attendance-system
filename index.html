<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salpointe Attendance</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <nav class="tabs">
        <button class="tab-btn active" onclick="showTab('log')">Log Attendance</button>
        <button class="tab-btn" onclick="showTab('status-tab')">Student Status</button>
    </nav>

    <div class="container">
        <section id="log" class="tab-content active">
            <div class="card">
                <h1>Log Attendance</h1>
                <button id="connectBtn">CONNECT ARDUINO</button>
                <p>Status: <span id="status">Disconnected</span></p>
                <hr>
                <div class="display-box">
                    <h2>Last Scan:</h2>
                    <div id="lastID">------</div>
                </div>
                <p id="serverMsg"></p>
            </div>
        </section>

        <section id="status-tab" class="tab-content">
            <div class="card wide-card">
                <h1>Current Status</h1>
                <table id="statusTable">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>ID</th>
                            <th>Current State</th>
                        </tr>
                    </thead>
                    <tbody id="statusBody">
                        </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
