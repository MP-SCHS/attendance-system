<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salpointe Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <nav class="tabs">
        <button class="tab-btn active" onclick="showTab(event, 'log')">Log Attendance</button>
        <button class="tab-btn" onclick="showTab(event, 'status-tab')">Student Status</button>
    </nav>

    <div class="container">
        <section id="log" class="tab-content active">
            <div class="card">
                <h1>Log Attendance</h1>
                <button id="connectBtn">CONNECT ARDUINO</button>
                <p class="connection-status">System: <span id="status">Disconnected</span></p>
                <div class="display-box">
                    <p class="label">Last Scan</p>
                    <div id="lastID">------</div>
                </div>
                <p id="serverMsg"></p>
            </div>
        </section>

        <section id="status-tab" class="tab-content">
            <div class="card wide-card">
                <h1>Student Status</h1>
                <div class="table-container">
                    <table id="statusTable">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>ID</th>
                                <th>State</th>
                            </tr>
                        </thead>
                        <tbody id="statusBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
